[build]
  # Build command for Next.js
  command = "npm run build"
  
  # Directory to publish (Next.js output)
  publish = ".next"
  
  # Node.js version
  [build.environment]
    NODE_VERSION = "18"
    NPM_VERSION = "9"

# Redirect rules for Next.js App Router
[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 200

# Handle client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache API routes for short period
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Functions configuration for API routes
[functions]
  # Node.js runtime for serverless functions
  node_bundler = "esbuild"
  
# Plugin configuration
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Environment variables (set these in Netlify dashboard)
# GEMINI_API_KEY - Your Gemini AI API key
# RESEND_API_KEY - Your Resend email API key
# LIVEKIT_API_KEY - Your LiveKit API key (if using voice features)
# LIVEKIT_API_SECRET - Your LiveKit API secret (if using voice features)
